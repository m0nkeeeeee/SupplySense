version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supply-chain-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - copilot-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
        VITE_WS_BASE_URL: ws://localhost:8000/api/v1
    container_name: supply-chain-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - copilot-net

  # Optional local MongoDB for development without Atlas. In production,
  # point MONGODB_URI in backend/.env at your Atlas cluster instead and
  # remove/ignore this service.
  mongo:
    image: mongo:7
    container_name: supply-chain-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - copilot-net
    profiles:
      - local-mongo

networks:
  copilot-net:
    driver: bridge

volumes:
  mongo-data:
